<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page metadata -->
    <meta charset="UTF-8">
    <title>Add Book</title>

    <!-- External stylesheets -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='base.css') }}"/>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='add_book.css') }}"/>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='modal_formatting.css') }}"/>

    <style>
      /* Improve layout scaling for larger screens */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      /* Responsive row layout */
      .row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .row > div {
        flex: 1;
        min-width: 250px;
      }
    </style>
</head>

<body>

  <!-- Child template inheritance placeholder -->
  {% block body %}
  {% endblock %}

<main class="container">

    <!-- Navigation link -->
    <div class="nav-buttons">
        <a href="/">🏠 Home</a>
    </div>

    <h1>Add Book</h1>

    <form method="POST">
        <!-- Title -->
        <label for="Title">Title</label>
        <input type="text" id="Title" name="Title" required>

        <!-- Primary Author -->
        <fieldset>
            <legend>Primary Author</legend>

            <div class="row">
                <div>
                    <label for="Author_First_Name_1">First Name</label>
                    <input type="text" id="Author_First_Name_1" name="Author_First_Name_1" required>
                </div>

                <div>
                    <label for="Author_Last_Name_1">Last Name</label>
                    <input type="text" id="Author_Last_Name_1" name="Author_Last_Name_1" required>
                </div>
            </div>
        </fieldset>

        <!-- Toggle Secondary Author -->
        <button type="button" class="toggle-btn transition_css" onclick="toggleAuthor()">
            + Add Secondary Author
        </button>

        <!-- Secondary Author -->
        <fieldset id="secondaryAuthor" class="hidden">
            <legend>Secondary Author (Optional)</legend>

            <div class="row">
                <div>
                    <label for="Author_First_Name_2">First Name</label>
                    <input type="text" id="Author_First_Name_2" name="Author_First_Name_2">
                </div>

                <div>
                    <label for="Author_Last_Name_2">Last Name</label>
                    <input type="text" id="Author_Last_Name_2" name="Author_Last_Name_2">
                </div>
            </div>
        </fieldset>

        <!-- ISBN + Publisher -->
        <div class="row">
            <div>
                <label for="ISBN">ISBN</label>
                <input type="text" id="ISBN" name="ISBN" required>
            </div>

            <div>
                <label for="Publisher_Name">Publisher</label>
                <input type="text" id="Publisher_Name" name="Publisher_Name">
            </div>
        </div>

        <!-- Year + Chapters -->
        <div class="row">
            <div>
                <label for="Publish_Year">Year Published</label>
                <input type="text" id="Publish_Year" name="Publish_Year" required>
            </div>

            <div>
                <label for="Chapters">Chapters</label>
                <input type="text" id="Chapters" name="Chapters">
            </div>
        </div>

        <!-- Genre -->
        <fieldset>
            <legend>Fiction or Non-Fiction</legend>

            <label><input type="radio" name="Genre_1" value="fiction" checked> Fiction</label>
            <label><input type="radio" name="Genre_1" value="nonfiction"> Non-Fiction</label>
        </fieldset>

        <!-- Submit -->
        <button type="submit" class="transition_css">Add Book</button>

    </form>
</main>

<script>
function toggleAuthor() {
  document.getElementById("secondaryAuthor").classList.toggle("hidden");
}
</script>

</body>
</html>
