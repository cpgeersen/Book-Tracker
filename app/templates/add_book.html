<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page metadata -->
    <meta charset="UTF-8">
    <title>Add Book</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='base.css') }}"/>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='add_book.css') }}"/>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='modal_formatting.css') }}"/>
</head>

<body>

  <!-- Child template inheritance placeholder for modal_present.html and modal_malformed.html. -->
  {% block body %}
  {% endblock %}

<main class="container">

      <!-- Navigation link -->
    <div class="nav-buttons">
        <a href="/">🏠 Home</a>
    </div>

    <h1>Add Book</h1>

    <form method="POST">

        <!-- Title -->
        <label for="Title">Title</label>
        <input type="text" id="Title" name="Title" required>

        <!-- Primary Author -->
        <fieldset>
            <legend>Primary Author</legend>

            <div class="row">
                <div>
                    <label for="Author_First_Name_1">First Name</label>
                    <input type="text" id="Author_First_Name_1" name="Author_First_Name_1" required>
                </div>

                <div>
                    <label for="Author_Last_Name_1">Last Name</label>
                    <input type="text" id="Author_Last_Name_1" name="Author_Last_Name_1" required>
                </div>
            </div>
        </fieldset>

        <!-- Toggle Secondary Author -->
        <button type="button" class="toggle-btn transition_css" onclick="toggleAuthor()">
            + Add Secondary Author
        </button>

        <!-- Secondary Author -->
        <fieldset id="secondaryAuthor" class="hidden">
            <legend>Secondary Author (Optional)</legend>

            <div class="row">
                <div>
                    <label for="Author_First_Name_2">First Name</label>
                    <input type="text" id="Author_First_Name_2" name="Author_First_Name_2">
                </div>

                <div>
                    <label for="Author_Last_Name_2">Last Name</label>
                    <input type="text" id="Author_Last_Name_2" name="Author_Last_Name_2">
                </div>
            </div>
        </fieldset>

        <!-- ISBN + Publisher row -->
        <div class="row">
            <div>
                <label for="ISBN">ISBN (10 or 13)</label>
                <input type="text"
                       id="ISBN"
                       name="ISBN"
                       pattern="[0-9]{10}|[0-9]{13}"
                       inputmode="numeric"
                       required>
            </div>

            <div>
                <label for="Publisher_Name">Publisher</label>
                <input type="text" id="Publisher_Name" name="Publisher_Name">
            </div>
        </div>

        <!-- Year + Chapters row -->
        <div class="row">
            <div>
                <label for="Publish_Year">Year Published</label>
                <input type="text"
                       id="Publish_Year"
                       name="Publish_Year"
                       pattern="[0-9]+"
                       inputmode="numeric"
                       required>
            </div>

            <div>
                <label for="Chapters">Chapters</label>
                <input type="text"
                       id="Chapters"
                       name="Chapters"
                       pattern="[0-9]+"
                       inputmode="numeric">
            </div>
        </div>

        <!-- Fiction / Non-Fiction -->
        <fieldset>
            <legend>Fiction or Non-Fiction</legend>

            <div class="radio-group">
                <label>
                    <input type="radio" name="Genre_1" value="fiction" checked>
                    Fiction
                </label>

                <label>
                    <input type="radio" name="Genre_1" value="nonfiction">
                    Non-Fiction
                </label>
            </div>
        </fieldset>

        <!-- Tags -->
        <fieldset>
            <legend>Tags</legend>

            <div class="tags-grid">
                <label><input type="checkbox" name="Owned">Owned</label>
                <label><input type="checkbox" name="Favorite">Favorite</label>
                <label><input type="checkbox" name="Completed">Completed</label>
                <label><input type="checkbox" name="Currently_Reading">Currently Reading</label>
            </div>

            <fieldset>
                <legend>Reading Type</legend>

                <div class="radio-group">
                    <label><input type="radio" name="Personal_Or_Academic" value="personal" checked>Personal</label>
                    <label><input type="radio" name="Personal_Or_Academic" value="academic">Academic</label>
                </div>

            </fieldset>
        </fieldset>

        <button type="submit" class="transition_css">Add Book</button>

    </form>
</main>


<script>
    function toggleAuthor() {
      const section = document.getElementById("secondaryAuthor")
      section.classList.toggle("hidden")
    }
</script>
</body>
</html>
