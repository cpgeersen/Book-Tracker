<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page metadata -->
    <meta charset="UTF-8">
    <title>User Settings</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='base.css') }}"/>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='add_book.css') }}"/>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='modal_formatting.css') }}"/>
</head>

<body>

<main class="container">

      <!-- Navigation link -->
    <div class="nav-buttons">
        <a href="/">🏠 Home</a>
    </div>


    <h1>User Settings</h1>

    <form id="Settings">
        <!-- Username Input -->
        <label for="Username">Username</label>
        <input type="text" id="Username" name="Username" required>

	<!-- About Me -->
	<!--<label for="Abt_Me">About Me</label>
	<input type="text" id="Abt_Me" name="Abt_Me" size="30">-->

        <!-- Theme Settings  -->
         <fieldset>
            <legend>Theme Setting</legend>

            <div class="radio-group">
                <label>
                    <input type="radio" name="Theme" value="Dark" checked>
                    Dark
                </label>

                <label>
                    <input type="radio" name="Theme" value="Light">
                    Light
                </label>
            </div>
        </fieldset>

        <!-- Save input to JSON file. -->
        <button type="button" class="transition_css" onclick="convertJSON()">Save Settings</button>
    </form>
    
</main>

<script>

     // Function to convert form data to JSON. 
    function convertJSON(){
        const form = document.getElementById("Settings");
        const formData = new FormData(form);
        const jsonObject = {}

        formData.forEach((value, key) => {
            jsonObject[key] = value;
        });
    }

</script>
</body>
</html>
